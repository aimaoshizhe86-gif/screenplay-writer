function renderCategories(filter = '') {
  const container = document.getElementById('categories');
  let html = '';
  VOCAB.forEach(cat => {
    if (filter && cat.cat !== filter) return;
    html += `<div class="category-section">
      <div class="category-header">
        <span class="category-icon">${cat.icon}</span>
        <span class="category-name">${cat.cat}</span>
        <span class="category-desc">${cat.desc}</span>
      </div>
      <div class="vocab-grid">`;
    cat.entries.forEach(e => {
      html += `<div class="vocab-card">
        <div class="vocab-word">${e.word}</div>
        <div class="vocab-phrases">${e.phrases.map(p=>`<span>${p}</span>`).join('')}</div>
        <div class="vocab-usage">${e.usage}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function renderFilters() {
  const bar = document.getElementById('filterBar');
  const categories = ['全部', ...VOCAB.map(c => c.cat)];
  bar.innerHTML = categories.map((c,i) =>
    `<button class="filter-btn${i===0?' active':''}" onclick="filterCategory('${i===0?'':c}')">${c}</button>`
  ).join('');
}

function filterCategory(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderCategories(cat);
}

function rollRandom() {
  const allEntries = VOCAB.flatMap(c => c.entries.map(e => ({...e, catName: c.cat})));
  const pick = allEntries[Math.floor(Math.random() * allEntries.length)];
  document.getElementById('rw').textContent = `${pick.word}（${pick.catName}）`;
  document.getElementById('rp').textContent = pick.phrases.join(' ; ');
  document.getElementById('ru').textContent = pick.usage;
  document.getElementById('randomOutput').classList.add('visible');
}

document.addEventListener('DOMContentLoaded', () => {
  renderFilters();
  renderCategories();
  document.body.classList.add('loaded');
});
</script>
